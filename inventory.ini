# Define the hosts and their specific IP addresses
[all]
head  ansible_host=10.150.0.10
node1 ansible_host=10.150.0.11
node2 ansible_host=10.150.0.12

# Define the control node
[master]
head

# Define the worker nodes
[workers]
node1
node2

# Global configuration variables for all hosts
[all:vars]
ansible_user=root
ansible_ssh_pass=ansible
# Common SSH arguments to bypass host key verification and avoid known_hosts clutter
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'