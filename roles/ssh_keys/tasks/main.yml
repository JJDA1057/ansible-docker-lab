---
- name: Generate SSH key on the head node
  shell: ssh-keygen -t rsa -b 4096 -f /root/.ssh/id_rsa -N ""
  args:
    creates: /root/.ssh/id_rsa
  when: inventory_hostname == 'head'

- name: Read the public key from head
  slurp:
    src: /root/.ssh/id_rsa.pub
  register: head_public_key
  delegate_to: head
  run_once: true

- name: Copy the head public key to other nodes
  authorized_key:
    user: root
    state: present
    key: "{{ head_public_key.content | b64decode }}"
  when: inventory_hostname != 'head'

  - name: Configure SSH to automatically trust internal nodes
  copy:
    dest: /root/.ssh/config
    content: |
      Host 10.150.0.*
          StrictHostKeyChecking no
          UserKnownHostsFile /dev/null
    mode: '0600'
  when: inventory_hostname == 'head'